name: Build Multi-Platform Artifacts

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: [sabalong-runner2]
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DuckDB and App (Linux amd64)
        run: |
          docker build \
            --target appbuilder \
            --build-arg TARGETARCH=amd64 \
            -t fincent-api-builder:linux-amd64 \
            .

      - name: Extract Linux amd64 Binary
        run: |
          docker rm -f extract-linux 2>/dev/null || true
          docker create --name extract-linux fincent-api-builder:linux-amd64
          docker cp extract-linux:/app/main ./fincent-api-linux-amd64
          docker rm extract-linux
          chmod +x ./fincent-api-linux-amd64

      - name: Upload Linux amd64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fincent-api-linux-amd64
          path: ./fincent-api-linux-amd64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'

      - name: Install Dependencies
        run: |
          brew install cmake git python3

      - name: Build DuckDB and App (macOS arm64)
        run: |
          chmod +x scripts/build_multi_platform.sh
          ./scripts/build_multi_platform.sh

      - name: Upload macOS arm64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fincent-api-macos-arm64
          path: ./artifacts/fincent-api-macos-arm64

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fincent-api-linux-amd64/fincent-api-linux-amd64
            fincent-api-macos-arm64/fincent-api-macos-arm64
