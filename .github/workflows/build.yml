name: Build Multi-Platform Artifacts

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DuckDB and App (Linux amd64)
        run: |
          docker build \
            --target appbuilder \
            --build-arg TARGETARCH=amd64 \
            -t fincent-api-builder:linux-amd64 \
            .

      - name: Extract Linux amd64 Binary
        run: |
          docker create --name extract-linux fincent-api-builder:linux-amd64
          docker cp extract-linux:/app/duckdb-tester/main ./fincent-api-linux-amd64
          docker rm extract-linux
          chmod +x ./fincent-api-linux-amd64

      - name: Upload Linux amd64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fincent-api-linux-amd64
          path: ./fincent-api-linux-amd64

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'

      - name: Install Dependencies
        run: |
          brew install cmake git python3

      - name: Build DuckDB Native Libraries
        run: |
          chmod +x scripts/build_duckdb_native.sh
          export CMAKE_POLICY_VERSION_MINIMUM=3.5
          ./scripts/build_duckdb_native.sh

      - name: Build Go Application (macOS arm64)
        run: |
          cd appgo
          CGO_ENABLED=1 \
          CPPFLAGS="-DDUCKDB_STATIC_BUILD" \
          CGO_LDFLAGS="-L../duckdblib -framework Compression -larrow_extension -larrow -lduckdb_fastpforlib -lduckdb_fmt -lduckdb_fsst -lduckdb_hyperloglog -lduckdb_mbedtls -lduckdb_miniz -lduckdb_pg_query -lduckdb_re2 -lduckdb_skiplistlib -lduckdb_utf8proc -lduckdb_yyjson -limdb -lduckdb_static -lduckdb_zstd -ljemalloc_extension -lparquet_extension -lstdc++ -lm -ldl -lminizip-ng -lcore_functions_extension -lz -lexcel_extension -lexpat" \
          go build -tags=duckdb_use_static_lib -o ../fincent-api-macos-arm64 ./duckdb-tester/main.go
          chmod +x ../fincent-api-macos-arm64

      - name: Upload macOS arm64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fincent-api-macos-arm64
          path: ./fincent-api-macos-arm64

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fincent-api-linux-amd64/fincent-api-linux-amd64
            fincent-api-macos-arm64/fincent-api-macos-arm64
